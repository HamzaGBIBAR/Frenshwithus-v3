<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function() {
        const lang = localStorage.getItem('frenchwithus-lang');
        if (lang === 'ar') document.documentElement.dir = 'rtl';
      })();
    </script>
    <script>
      (function() {
        const stored = localStorage.getItem('frenchwithus-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = stored === 'dark' || (stored !== 'light' && prefersDark);
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>French With Us</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,500;0,6..12,600;0,6..12,700;1,6..12,400&family=Noto+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-french-pattern">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
